<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Painel Tático - Ponte Segura</title>
    
    <!-- React via CDN -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Google Fonts Premium: Outfit -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Outfit', sans-serif; }
        body { 
            background: #020617;
            background: radial-gradient(circle at top left, #0f172a, #020617);
            color: #e2e8f0; min-height: 100vh; overflow: hidden; display: flex; flex-direction: column;
        }

        /* Efeito Premium de Vidro (Glassmorphism) */
        .glass {
            background: rgba(15, 23, 42, 0.4);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
        }

        /* ---------------- LOGO E ANIMAÇÕES DO LOGIN ---------------- */
        .login-wrap { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; position: relative; }
        .login-wrap::before {
            content: ''; position: absolute; width: 400px; height: 400px; background: #3b82f6; border-radius: 50%; filter: blur(120px); opacity: 0.15; top: -10%; left: -10%; animation: float 6s ease-in-out infinite;
        }
        .login-wrap::after {
            content: ''; position: absolute; width: 350px; height: 350px; background: #10b981; border-radius: 50%; filter: blur(120px); opacity: 0.15; bottom: -10%; right: -10%; animation: float 8s ease-in-out infinite reverse;
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-30px); }
            100% { transform: translateY(0px); }
        }

        .login-box { 
            padding: 50px 40px; border-radius: 24px; text-align: center; width: 90%; max-width: 420px; position: relative; z-index: 10;
            border-top: 2px solid rgba(16, 185, 129, 0.6);
        }
        .login-box h2 { font-size: 32px; font-weight: 800; margin-bottom: 5px; background: linear-gradient(90deg, #10b981, #3b82f6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        .login-input { 
            width: 100%; padding: 18px; margin-bottom: 25px; background: rgba(0, 0, 0, 0.3); border: 1px solid rgba(255,255,255,0.08); 
            color: white; border-radius: 14px; font-size: 16px; text-align: center; transition: all 0.3s; outline: none; letter-spacing: 2px;
        }
        .login-input:focus { border-color: #10b981; box-shadow: 0 0 20px rgba(16, 185, 129, 0.15); }
        
        .login-btn { 
            width: 100%; padding: 18px; background: linear-gradient(135deg, #10b981, #059669); color: white; border: none; border-radius: 14px; 
            font-size: 16px; font-weight: 600; cursor: pointer; transition: transform 0.2s, box-shadow 0.2s; letter-spacing: 1px;
        }
        .login-btn:hover { transform: translateY(-2px); box-shadow: 0 10px 25px rgba(16, 185, 129, 0.3); }

        /* ---------------- TOPBAR AUTORIDADES ---------------- */
        .navbar { padding: 20px 40px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.03); z-index: 10; }
        .navbar .logo { font-size: 18px; font-weight: 800; letter-spacing: 3px; color: #f8fafc; display: flex; align-items: center; gap: 15px; text-transform: uppercase;}
        
        /* Luz vermelha pulsante da polícia */
        .pulse-dot { width: 10px; height: 10px; background-color: #ef4444; border-radius: 50%; box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); animation: pulse-red 2s infinite; }
        @keyframes pulse-red {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }

        .btn-refresh { 
            background: rgba(59, 130, 246, 0.1); border: 1px solid rgba(59, 130, 246, 0.2); color: #60a5fa; padding: 12px 24px; 
            border-radius: 30px; cursor: pointer; font-weight: 600; transition: all 0.3s; display: flex; align-items: center; gap: 8px;
        }
        .btn-refresh:hover { background: rgba(59, 130, 246, 0.2); box-shadow: 0 0 20px rgba(59, 130, 246, 0.2); transform: translateY(-1px);}

        /* ---------------- ÁREA DO CONTEÚDO (GRID) ---------------- */
        .dashboard-container { display: flex; flex: 1; padding: 30px; overflow-y: auto; justify-content: center; align-items: flex-start; }
        .content-box { width: 100%; max-width: 1400px; animation: fadeUp 0.6s cubic-bezier(0.16, 1, 0.3, 1); }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .header-painel { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .tab-title { font-size: 26px; font-weight: 300; color: #94a3b8; }
        
        .stat-card { background: rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.03); border-radius: 16px; padding: 15px 30px; display: inline-flex; align-items: center; gap: 15px;}
        .stat-num { font-size: 34px; font-weight: 800; color: #f8fafc; }

        /* ---------------- TABELA DE MESA (DESKTOP) ---------------- */
        .table-wrapper { border-radius: 16px; overflow: hidden; border: 1px solid rgba(255,255,255,0.03); }
        .data-table { width: 100%; border-collapse: collapse; text-align: left; }
        .data-table th, .data-table td { padding: 22px 24px; }
        .data-table th { background: rgba(0,0,0,0.4); color: #cbd5e1; font-size: 13px; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase; border-bottom: 1px solid rgba(255,255,255,0.03); }
        .data-table tr { border-bottom: 1px solid rgba(255,255,255,0.01); transition: background 0.2s; }
        .data-table tr:hover { background: rgba(255,255,255,0.02); }
        .data-table td { color: #f1f5f9; font-size: 16px; }

        .row-alert { border-left: 4px solid #ef4444; }
        .row-ok { border-left: 4px solid #10b981; }

        .badge-red { background: rgba(239, 68, 68, 0.1); border: 1px solid rgba(239, 68, 68, 0.3); color: #fca5a5; padding: 6px 14px; border-radius: 20px; font-size: 12px; font-weight: 600; vertical-align: middle; display: inline-flex; align-items: center; gap: 8px;}
        .badge-red::before { content: ''; display: inline-block; width: 6px; height: 6px; background: #ef4444; border-radius: 50%; animation: pulse-red 1.5s infinite; }
        
        .badge-green { background: rgba(16, 185, 129, 0.1); border: 1px solid rgba(16, 185, 129, 0.3); color: #6ee7b7; padding: 6px 14px; border-radius: 20px; font-size: 12px; font-weight: 600; vertical-align: middle;}

        /* ---------------- CARDS VIATURA (MOBILE Oculto no PC) ---------------- */
        .mobile-card-list { display: none; flex-direction: column; gap: 20px; }
        .mobile-card { border-radius: 16px; padding: 25px; transition: transform 0.2s; position: relative; overflow: hidden;}
        .mobile-card::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 5px; background: #ef4444; }
        .mobile-card.ok-card::before { background: #10b981; }

        .mobile-card h3 { color: #f8fafc; font-size: 20px; margin-bottom: 12px; font-weight: 600;}
        .mobile-card p { color: #94a3b8; font-size: 15px; margin-bottom: 12px; display: flex; align-items: center; gap: 8px;}
        .mobile-card .date-tag { font-size: 13px; opacity: 0.6; color: #94a3b8;}

        /* RESPONSOVIDADE */
        @media (max-width: 900px) {
            .table-wrapper { display: none; }
            .mobile-card-list { display: flex; }
            .navbar { padding: 20px; flex-direction: column; gap: 20px; }
            .dashboard-container { padding: 15px; }
            .header-painel { flex-direction: column; align-items: flex-start; gap: 20px; }
            .login-box { padding: 40px 30px; }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
const { useState } = React;

function AutomacaoPolicia() {
    const [authData, setAuthData] = useState(null)
    const [passwordInput, setPasswordInput] = useState('')
    const [alertasArr, setAlertasArr] = useState([])
    const [loading, setLoading] = useState(false)

    const handleAcesso = () => {
        if(!passwordInput) return;
        setLoading(true);
        fazerFetchDeDados(passwordInput);
    };

    const fazerFetchDeDados = (senhaAtual) => {
        setLoading(true);
        fetch('http://127.0.0.1:8000/api/painel/', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ senha: senhaAtual })
        })
        .then(response => response.json())
        .then(data => {
            setLoading(false);
            if(data.sucesso) {
                setAuthData(senhaAtual);
                setAlertasArr(data.alertas);
            } else {
                alert("Acesso Negado: " + data.erro);
                setPasswordInput('');
            }
        })
        .catch(err => {
            setLoading(false);
            alert("Erro de conexão.");
        });
    }

    if (!authData) {
        return (
            <div className="login-wrap">
                <div className="glass login-box">
                    <h2>COMANDO</h2>
                    <p style={{color:'#64748b', marginBottom: '35px', fontWeight: '300', fontSize: '15px'}}>Identificação Militar Requerida</p>
                    <input 
                        type="password" 
                        value={passwordInput} 
                        onChange={(e) => setPasswordInput(e.target.value)}
                        placeholder="Nº CREDENCIAL" 
                        className="login-input" 
                    />
                    <button className="login-btn" onClick={handleAcesso} disabled={loading}>
                        {loading ? 'Processando...' : 'AUTENTICAR DIRETRIZ'}
                    </button>
                </div>
            </div>
        )
    }

    const unhandledCount = alertasArr.filter(a => !a.resolvido).length;

    return (
        <React.Fragment>
            <div className="glass navbar">
                <div className="logo">
                    <div className="pulse-dot"></div>
                    QG TÁTICO
                </div>
                <button className="btn-refresh" onClick={() => fazerFetchDeDados(authData)}>
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.59-10.3l1.75 2.73"/></svg>
                    ATUALIZAR RADAR
                </button>
            </div>

            <div className="dashboard-container">
                <div className="content-box">
                    
                    <div className="header-painel">
                        <h1 className="tab-title">Radar de Ocorrências</h1>
                        <div className="glass stat-card">
                            <div>
                                <p style={{fontSize: '12px', color: '#94a3b8', textTransform: 'uppercase', letterSpacing: '1px'}}>Chamados em Aberto</p>
                                <div className="stat-num">{unhandledCount}</div>
                            </div>
                        </div>
                    </div>
                    
                    {alertasArr.length === 0 ? (
                        <p style={{background: 'rgba(0,0,0,0.2)', color: '#94a3b8', padding: '40px', textAlign: 'center', borderRadius: '16px'}}>
                            O perímetro está seguro. Nenhum sinal de SOS detectado.
                        </p>
                    ) : (
                        <React.Fragment>
                            {/* [Desktop Mode] */}
                            <div className="table-wrapper glass">
                                <table className="data-table">
                                    <thead>
                                        <tr>
                                            <th>Situação Operacional</th>
                                            <th>Nome do Alvo / Civil</th>
                                            <th>Canal de Contato</th>
                                            <th>Coordenada Local</th>
                                            <th>Acionamento</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        {alertasArr.map(alerta => (
                                            <tr key={alerta.id} className={alerta.resolvido ? "row-ok" : "row-alert"}>
                                                <td>
                                                    <span className={alerta.resolvido ? "badge-green" : "badge-red"}>
                                                        {alerta.resolvido ? "CÓDIGO VERDE" : "ENVIAR PATRULHA"}
                                                    </span>
                                                </td>
                                                <td style={{fontWeight: '600', color: '#e2e8f0'}}>{alerta.estudante_nome}</td>
                                                <td style={{color: '#94a3b8'}}>{alerta.estudante_telefone}</td>
                                                <td>📍 {alerta.localizacao}</td>
                                                <td style={{color: '#94a3b8'}}>{alerta.data_hora}</td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>

                            {/* [Mobile Mode] */}
                            <div className="mobile-card-list">
                                {alertasArr.map(alerta => (
                                    <div className={`glass mobile-card ${alerta.resolvido ? 'ok-card' : ''}`} key={alerta.id}>
                                        <div style={{display: 'flex', justifyContent: 'space-between', marginBottom: '15px'}}>
                                            <span className={alerta.resolvido ? "badge-green" : "badge-red"}>
                                                {alerta.resolvido ? "RESOLVIDO" : "ENVIAR PATRULHA"}
                                            </span>
                                            <span style={{fontSize: '12px', opacity: 0.5}}>#{alerta.id}</span>
                                        </div>
                                        <h3>{alerta.estudante_nome}</h3>
                                        <p><span>📍</span> {alerta.localizacao}</p>
                                        <p><span>📞</span> {alerta.estudante_telefone}</p>
                                        <p className="date-tag" style={{marginTop: '15px'}}>{alerta.data_hora}</p>
                                    </div>
                                ))}
                            </div>
                        </React.Fragment>
                    )}
                </div>
            </div>
        </React.Fragment>
    )
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<AutomacaoPolicia />);
    </script>
</body>
</html>
